services:
  - type: web
    name: regex-replacer
    env: python
    plan: free
    buildCommand: |
      cd frontend && npm ci && npm run build
      cd ../backend && pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: regex-replacer.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://regex-replacer.onrender.com
